<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSMLH — Human Intelligence Protection</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --secondary: #8e8e93;
            --accent: #ffffff;
            --btn-bg: #2d2d2d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            -webkit-font-smoothing: antialiased;
        }

        /* Выбор языка в углу */
        .lang-switch {
            position: absolute;
            top: 20px;
            right: 20px;
            display: flex;
            gap: 15px;
            z-index: 10;
        }

        .lang-btn {
            background: none;
            border: none;
            color: var(--secondary);
            cursor: pointer;
            font-size: 13px;
            letter-spacing: 1px;
            transition: color 0.3s;
        }

        .lang-btn.active { color: var(--text); font-weight: bold; }

        /* Контент центрального экрана */
        .main-container {
            text-align: center;
            animation: fadeIn 1.5s ease-out;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo {
            font-size: 32px;
            font-weight: 500;
            letter-spacing: 8px;
            margin-bottom: 60px;
            transition: letter-spacing 0.5s;
        }

        .logo:hover { letter-spacing: 12px; }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .primary-btn {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .secondary-btn {
            background-color: transparent;
            color: var(--text);
            border: 1px solid #333;
            padding: 14px;
            border-radius: 4px;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }

        .secondary-btn:hover {
            background-color: rgba(255,255,255,0.05);
        }

        .primary-btn:hover { opacity: 0.9; }

        .footer-note {
            position: absolute;
            bottom: 40px;
            font-size: 12px;
            color: var(--secondary);
            letter-spacing: 0.5px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn" onclick="setLang('kz')" id="kz-btn">KZ</button>
        <button class="lang-btn active" onclick="setLang('ru')" id="ru-btn">RU</button>
    </div>

    <div class="main-container">
        <div class="logo">BSMLH</div>
        
        <div class="btn-group">
            <button class="primary-btn" id="login-text" onclick="alert('Переход к NFC...')">Войти</button>
            <button class="secondary-btn" id="reg-text" onclick="alert('Запуск онбординга...')">Зарегистрироваться</button>
        </div>
    </div>

    <div class="footer-note" id="footer-text">
        Universal Human Identification System
    </div>

    <script>
        const translations = {
            ru: {
                login: "Войти",
                reg: "Зарегистрироваться",
                footer: "Universal Human Identification System"
            },
            kz: {
                login: "Кіру",
                reg: "Тіркелу",
                footer: "Универсалды Адам Идентификациялау Жүйесі"
            }
        };

        function setLang(lang) {
            // Тексты
            document.getElementById('login-text').innerText = translations[lang].login;
            document.getElementById('reg-text').innerText = translations[lang].reg;
            document.getElementById('footer-text').innerText = translations[lang].footer;

            // Активные кнопки
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(lang + '-btn').classList.add('active');
        }
    </script>
</body>
</html>
