<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSMLH</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; margin: 0; }
        .card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 10px; margin: 10px; text-align: left; }
        .btn { width: 90%; padding: 15px; margin: 10px 0; border-radius: 5px; border: none; font-weight: bold; }
        #v { width: 160px; height: 160px; border-radius: 50%; border: 2px solid #f6851b; object-fit: cover; }
    </style>
</head>
<body>
    <div id="step1">
        <h1 style="letter-spacing:5px; margin-top:50px;">BSMLH</h1>
        <button class="btn" style="background:#fff;" onclick="login()">ВОЙТИ (NFC)</button>
        <button class="btn" style="background:#222; color:#fff;" onclick="reg()">РЕГИСТРАЦИЯ</button>
    </div>

    <div id="step2" style="display:none; padding:20px;">
        <video id="video" autoplay playsinline style="width:160px; height:160px; border-radius:50%;"></video><br>
        <button class="btn" style="background:#f6851b;" onclick="snap()">СДЕЛАТЬ ФОТО</button>
    </div>

    <div id="step3" style="display:none; padding:20px;">
        <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
            <img id="photo" style="width:60px; height:60px; border-radius:50%; border:1px solid #f6851b;">
            <b id="huid" style="color:#f6851b;">HUID-XXXX</b>
        </div>
        <div class="card"><small style="color:#888;">СТАТУС</small><br>Верифицирован 🛡️</div>
        <div class="card"><small style="color:#888;">QRT BALANCE</small><br>1.00 QRT</div>
        <button class="btn" style="background:#222; color:#fff;" onclick="location.reload()">ВЫХОД</button>
    </div>

    <footer style="position:fixed; bottom:10px; width:100%; font-size:9px; color:#444;">
        BIOMETRIC SECURITY MULTI-FUNCTION LEDGER FOR HUMANITY
    </footer>

    <canvas id="c" style="display:none;"></canvas>

    <script>
        let imgData = "";
        async function reg() {
            document.getElementById('step1').style.display='none';
            document.getElementById('step2').style.display='block';
            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:"user"}});
            document.getElementById('video').srcObject = s;
        }
        function snap() {
            const v = document.getElementById('video');
            const canvas = document.getElementById('c');
            canvas.width = 100; canvas.height = 100; // Микро-размер для обхода ошибок
            canvas.getContext('2d').drawImage(v, 0, 0, 100, 100);
            imgData = canvas.toDataURL('image/jpeg', 0.2); // Сверх-сжатие
            v.srcObject.getTracks().forEach(t => t.stop());
            
            const h = "HUID-" + Math.random().toString(16).slice(2,8).toUpperCase();
            localStorage.setItem('u_id', 'KEY-1');
            localStorage.setItem('u_h', h);
            localStorage.setItem('u_p', imgData);
            show(h, imgData);
        }
        function login() {
            const h = localStorage.getItem('u_h');
            if(!h) return alert("Нужна регистрация");
            show(h, localStorage.getItem('u_p'));
        }
        function show(h, p) {
            document.getElementById('step1').style.display='none';
            document.getElementById('step2').style.display='none';
            document.getElementById('step3').style.display='block';
            document.getElementById('huid').innerText = h;
            document.getElementById('photo').src = p;
        }
    </script>
</body>
</html>
