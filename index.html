<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSMLH — Human Intelligence Protection</title>
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --secondary: #8e8e93;
            --accent: #ffffff;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            flex-direction: column;
            height: 100vh;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .lang-switch { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; }
        .lang-btn { background: none; border: none; color: var(--secondary); cursor: pointer; font-size: 13px; }
        .lang-btn.active { color: var(--text); font-weight: bold; }

        .main-container {
            text-align: center;
            transition: opacity 0.5s ease;
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }

        .logo { font-size: 32px; font-weight: 500; letter-spacing: 8px; margin-bottom: 60px; }

        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .primary-btn { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 4px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; }
        .secondary-btn { background: transparent; color: var(--text); border: 1px solid #333; padding: 14px; border-radius: 4px; font-size: 15px; cursor: pointer; }

        .footer-note { position: absolute; bottom: 40px; font-size: 12px; color: var(--secondary); }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('ru')" id="ru-btn">RU</button>
        <button class="lang-btn" onclick="setLang('kz')" id="kz-btn">KZ</button>
    </div>

    <div class="main-container" id="app-content">
        <div class="logo">BSMLH</div>
        <div class="btn-group">
            <button class="primary-btn" id="login-text" onclick="alert('Приложите кольцо для входа')">Войти</button>
            <button class="secondary-btn" id="reg-text" onclick="startOnboarding()">Зарегистрироваться</button>
        </div>
    </div>

    <div class="footer-note" id="footer-text">Universal Human Identification System</div>

    <script>
        let currentStep = 0;
        let selectedLang = 'ru';

        const translations = {
            ru: {
                login: "Войти",
                reg: "Зарегистрироваться",
                footer: "Universal Human Identification System",
                steps: [
                    { title: "Что такое HUID?", desc: "Ваш уникальный цифровой отпечаток в системе BSMLH." },
                    { title: "NFC Защита", desc: "Кольцо — это ваш физический ключ, который невозможно скопировать." },
                    { title: "Ваши данные", desc: "Мы используем блокчейн BSC для защиты ваших прав." }
                ],
                next: "Далее",
                kycTitle: "Верификация",
                kycDesc: "Требуется подтверждение личности для создания HUID",
                kycScan: "📸 Нажмите, чтобы сканировать паспорт"
            },
            kz: {
                login: "Кіру",
                reg: "Тіркелу",
                footer: "Универсалды Адам Идентификациялау Жүйесі",
                steps: [
                    { title: "HUID дегеніміз не?", desc: "BSMLH жүйесіндегі бірегей цифрлық таңбаңыз." },
                    { title: "NFC Қорғанысы", desc: "Сақина — көшіру мүмкін емес физикалық кілтіңіз." },
                    { title: "Деректеріңіз", desc: "Құқықтарыңызды қорғау үшін BSC блокчейнін қолданамыз." }
                ],
                next: "Алға",
                kycTitle: "Верификация",
                kycDesc: "HUID жасау үшін жеке басыңызды растау қажет",
                kycScan: "📸 Төлқұжатты сканерлеу үшін басыңыз"
            }
        };

        function setLang(lang) {
            selectedLang = lang;
            if(currentStep === 0 && !document.getElementById('steps-view')) {
                document.getElementById('login-text').innerText = translations[lang].login;
                document.getElementById('reg-text').innerText = translations[lang].reg;
                document.getElementById('footer-text').innerText = translations[lang].footer;
            }
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(lang + '-btn').classList.add('active');
        }

        function startOnboarding() {
            const container = document.getElementById('app-content');
            container.style.opacity = '0';
            setTimeout(() => {
                renderStep();
                container.style.opacity = '1';
            }, 500);
        }

        function renderStep() {
            const container = document.getElementById('app-content');
            const langData = translations[selectedLang];
            
            if (currentStep < langData.steps.length) {
                container.innerHTML = `
                    <div id="steps-view">
                        <div style="margin-bottom: 30px; font-size: 14px; color: #8e8e93;">${currentStep + 1} / 3</div>
                        <h2 style="margin-bottom: 20px; font-weight: 500;">${langData.steps[currentStep].title}</h2>
                        <p style="color: #8e8e93; line-height: 1.6; margin-bottom: 40px;">${langData.steps[currentStep].desc}</p>
                        <button class="primary-btn" onclick="nextStep()">${langData.next}</button>
                    </div>
                `;
            } else {
                renderKYC();
            }
        }

        function nextStep() {
            currentStep++;
            renderStep();
        }

        function renderKYC() {
            const container = document.getElementById('app-content');
            const langData = translations[selectedLang];
            container.innerHTML = `
                <h2 style="margin-bottom: 20px; font-weight: 500;">${langData.kycTitle}</h2>
                <p style="color: #8e8e93; margin-bottom: 30px;">${langData.kycDesc}</p>
                <div id="scan-box" style="border: 1px dashed #333; padding: 40px; border-radius: 8px; margin-bottom: 20px; cursor: pointer;" onclick="simulateKYC()">
                    <span id="kyc-status">${langData.kycScan}</span>
                </div>
            `;
        }

        function simulateKYC() {
            const status = document.getElementById('kyc-status');
            status.innerText = "⌛ Проверка документа...";
            setTimeout(() => {
                status.innerText = "✅ Личность подтверждена";
                setTimeout(() => {
                    alert("HUID сгенерирован! Переходим к привязке кольца.");
                    location.reload(); // Пока просто перезагрузка
                }, 1500);
            }, 2000);
        }
    </script>
</body>
</html>
