<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSMLH — Secure HUID Access</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --secondary: #8e8e93; --accent: #ffffff; --gold: #f6851b; --card-bg: #111111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        .main-container { flex: 1; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; text-align: center; }
        .logo { font-size: 32px; font-weight: 500; letter-spacing: 8px; margin-bottom: 60px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; width: 100%; max-width: 350px; }
        .primary-btn { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 4px; font-size: 15px; font-weight: 500; cursor: pointer; }
        .secondary-btn { background: transparent; color: var(--text); border: 1px solid #333; padding: 14px; border-radius: 4px; font-size: 15px; cursor: pointer; }

        /* Camera UI */
        #camera-ui { display: none; width: 100%; max-width: 350px; }
        .video-wrap { width: 220px; height: 280px; margin: 0 auto 20px; border-radius: 110px / 140px; overflow: hidden; border: 2px solid var(--gold); position: relative; }
        #video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }

        /* Dashboard */
        .dashboard { display: none; flex-direction: column; gap: 15px; width: 100%; max-width: 400px; text-align: left; padding: 20px; }
        .user-info { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; }
        .user-photo { width: 60px; height: 60px; border-radius: 50%; border: 2px solid var(--gold); overflow: hidden; background: #222; }
        .user-photo img { width: 100%; height: 100%; object-fit: cover; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 18px; border-radius: 12px; position: relative; }
        .card-title { color: var(--secondary); font-size: 10px; text-transform: uppercase; margin-bottom: 5px; }
        
        .footer-text { padding: 15px; text-align: center; color: var(--secondary); font-size: 9px; text-transform: uppercase; letter-spacing: 1px; border-top: 1px solid #111; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
<body>

    <div class="main-container" id="app-content">
        <div id="home-view">
            <div class="logo">BSMLH</div>
            <div class="btn-group">
                <button class="primary-btn" onclick="secureLogin()">Войти (NFC)</button>
                <button class="secondary-btn" onclick="startOnboarding()">Зарегистрироваться</button>
            </div>
            <div id="status-msg" style="margin-top:20px; color:var(--gold);"></div>
        </div>

        <div id="camera-ui">
            <h2 style="margin-bottom:20px;">Биометрия</h2>
            <div class="video-wrap">
                <video id="video" autoplay playsinline></video>
            </div>
            <button class="primary-btn" style="width:100%;" onclick="capturePhoto()">Сделать фото</button>
        </div>

        <div id="dynamic-content"></div>
    </div>

    <div class="dashboard" id="main-dashboard">
        <div class="user-info">
            <div class="user-photo"><img id="res-photo" src=""></div>
            <div>
                <div style="font-size: 12px; color: var(--secondary);">Личность подтверждена</div>
                <div id="user-huid-display" style="font-weight: bold; font-size: 16px; color: var(--gold);">HUID-2026-XXXX</div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">Статус</div>
            <div style="font-size: 18px;">Верифицирован 🛡️</div>
        </div>

        <div class="card">
            <div class="card-title">QRT Balance</div>
            <div style="font-size: 18px;">1.00 QRT</div>
        </div>

        <button class="secondary-btn" style="margin-top: 10px;" onclick="location.reload()">Выйти</button>
    </div>

    <footer class="footer-text">
        Biometric Security Multi-function Ledger for Humanity
    </footer>

    <canvas id="canvas" style="display:none;"></canvas>

    <script>
        let photoData = "";
        let currentStep = 0;

        const steps = [
            { title: "HUID", desc: "Ваша цифровая личность нового поколения." },
            { title: "BSMLH CHIP", desc: "Ваше кольцо — единственный ключ к данным." },
            { title: "Безопасность", desc: "Децентрализованное хранение данных." }
        ];

        async function startOnboarding() {
            document.getElementById('home-view').style.display = 'none';
            document.getElementById('camera-ui').style.display = 'block';
            const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
            document.getElementById('video').srcObject = stream;
        }

        function capturePhoto() {
            const v = document.getElementById('video');
            const c = document.getElementById('canvas');
            c.width = v.videoWidth;
            c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            photoData = c.toDataURL('image/png');
            
            if (v.srcObject) v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('camera-ui').style.display = 'none';
            renderStep();
        }

        function renderStep() {
            const content = document.getElementById('dynamic-content');
            if (currentStep < steps.length) {
                content.innerHTML = `
                    <h2 style="margin-bottom: 15px;">${steps[currentStep].title}</h2>
                    <p style="color: var(--secondary); margin-bottom: 30px;">${steps[currentStep].desc}</p>
                    <button class="primary-btn" style="width:200px;" onclick="nextStep()">Далее</button>
                `;
            } else { renderNFC(); }
        }

        function nextStep() { currentStep++; renderStep(); }

        function renderNFC() {
            document.getElementById('dynamic-content').innerHTML = `
                <h2>Готово</h2>
                <p id="st-text" style="color:var(--gold); margin-top:20px;">Приложите ваше кольцо для привязки...</p>
            `;
            runNFCBinding();
        }

        async function runNFCBinding() {
            const huid = "HUID-2026-" + Math.random().toString(16).slice(2,10).toUpperCase();
            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader(); await ndef.scan();
                    ndef.onreading = event => {
                        save(event.serialNumber, huid);
                        showDashboard(huid, photoData);
                    };
                } catch (e) { save("PC-DEBUG", huid); showDashboard(huid, photoData); }
            } else { save("PC-DEBUG", huid); showDashboard(huid, photoData); }
        }

        function save(uid, huid) {
            localStorage.setItem('nfc_uid', uid);
            localStorage.setItem('huid', huid);
            localStorage.setItem('user_p', photoData);
        }

        async function secureLogin() {
            const savedUID = localStorage.getItem('nfc_uid');
            if (!savedUID) { alert("Зарегистрируйтесь!"); return; }

            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader(); await ndef.scan();
                    document.getElementById('status-msg').innerText = "Поднесите кольцо...";
                    ndef.onreading = event => {
                        if (event.serialNumber === savedUID) {
                            showDashboard(localStorage.getItem('huid'), localStorage.getItem('user_p'));
                        } else { alert("Неверное кольцо!"); }
                    };
                } catch (e) { pcLogin(); }
            } else { pcLogin(); }
        }

        function pcLogin() {
            if (prompt("Код (1234):") === "1234") showDashboard(localStorage.getItem('huid'), localStorage.getItem('user_p'));
        }

        function showDashboard(huid, photo) {
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'flex';
            document.getElementById('user-huid-display').innerText = huid;
            document.getElementById('res-photo').src = photo;
        }
    </script>
</body>
</html>
