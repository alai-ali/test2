<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSMLH Ledger</title>
    <style>
        :root { --gold: #f6851b; --bg: #000; }
        body { background: var(--bg); color: #fff; font-family: sans-serif; margin: 0; text-align: center; }
        .wrap { display: flex; flex-direction: column; height: 100vh; padding: 20px; box-sizing: border-box; }
        .logo { font-size: 28px; letter-spacing: 6px; margin: 40px 0; }
        .btn { width: 100%; max-width: 300px; padding: 15px; margin: 10px auto; border-radius: 5px; border: none; font-weight: bold; cursor: pointer; }
        #v-box { display: none; }
        video { width: 220px; height: 280px; border-radius: 110px / 140px; border: 2px solid var(--gold); object-fit: cover; }
        #dash { display: none; text-align: left; }
        .card { background: #111; padding: 15px; border-radius: 10px; margin-top: 10px; border: 1px solid #222; }
        .footer { margin-top: auto; padding: 20px; font-size: 9px; color: #888; text-transform: uppercase; border-top: 1px solid #111; }
    </style>
</head>
<body>
    <div class="wrap">
        <div id="home">
            <div class="logo">BSMLH</div>
            <button class="btn" style="background:#fff;" onclick="login()">Войти (NFC)</button>
            <button class="btn" style="background:transparent; color:#fff; border:1px solid #333;" onclick="reg()">Регистрация</button>
        </div>

        <div id="v-box">
            <video id="v" autoplay playsinline></video>
            <button class="btn" style="background:#fff;" onclick="snap()">Сделать фото</button>
        </div>

        <div id="dash">
            <div style="display:flex; align-items:center; gap:15px; margin-bottom:20px;">
                <img id="res-img" style="width:60px; height:60px; border-radius:50%; border:2px solid var(--gold); object-fit:cover;">
                <div id="res-huid" style="font-weight:bold; color:var(--gold);">HUID-XXXX</div>
            </div>
            <div class="card"><div>Статус</div><div style="font-size:18px;">Верифицирован 🛡️</div></div>
            <div class="card"><div>Баланс</div><div style="font-size:18px;">1.00 QRT</div></div>
            <button class="btn" style="background:transparent; color:#fff; border:1px solid #333; width:100%;" onclick="location.reload()">Выйти</button>
        </div>

        <footer class="footer">Biometric Security Multi-function Ledger for Humanity</footer>
    </div>
    <canvas id="c" style="display:none;"></canvas>

    <script>
        let p = "";
        async function reg() {
            document.getElementById('home').style.display = 'none';
            document.getElementById('v-box').style.display = 'block';
            const s = await navigator.mediaDevices.getUserMedia({video: {facingMode: "user"}});
            document.getElementById('v').srcObject = s;
        }
        function snap() {
            const v = document.getElementById('v');
            const c = document.getElementById('c');
            c.width = v.videoWidth; c.height = v.videoHeight;
            c.getContext('2d').drawImage(v, 0, 0);
            p = c.toDataURL('image/jpeg', 0.5);
            v.srcObject.getTracks().forEach(t => t.stop());
            document.getElementById('v-box').innerHTML = "<h2 style='color:var(--gold)'>Приложите кольцо...</h2>";
            bind();
        }
        async function bind() {
            const h = "HUID-2026-" + Math.random().toString(16).slice(2, 8).toUpperCase();
            if ('NDEFReader' in window) {
                try {
                    const n = new NDEFReader(); await n.scan();
                    n.onreading = e => {
                        localStorage.setItem('u', e.serialNumber); localStorage.setItem('h', h); localStorage.setItem('i', p);
                        show(h, p);
                    };
                } catch(e) { pc(h); }
            } else { pc(h); }
        }
        function pc(h) { localStorage.setItem('u', 'PC'); localStorage.setItem('h', h); localStorage.setItem('i', p); setTimeout(() => show(h, p), 1000); }
        function login() {
            const u = localStorage.getItem('u');
            if (!u) return alert("Зарегистрируйтесь!");
            show(localStorage.getItem('h'), localStorage.getItem('i'));
        }
        function show(h, img) {
            document.getElementById('home').style.display = 'none';
            document.getElementById('v-box').style.display = 'none';
            document.getElementById('dash').style.display = 'block';
            document.getElementById('res-huid').innerText = h;
            document.getElementById('res-img').src = img;
        }
    </script>
</body>
</html>
