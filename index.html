<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BSMLH — Secure HUID Access</title>
    <style>
        :root { --bg: #000000; --text: #ffffff; --secondary: #8e8e93; --accent: #ffffff; --gold: #f6851b; --error: #ff4444; --card-bg: #111111; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background-color: var(--bg); color: var(--text); font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; justify-content: center; align-items: center; overflow: hidden; }
        
        .lang-switch { position: absolute; top: 20px; right: 20px; display: flex; gap: 15px; z-index: 100; }
        .lang-btn { background: none; border: none; color: var(--secondary); cursor: pointer; font-size: 13px; text-transform: uppercase; }
        .lang-btn.active { color: var(--text); font-weight: bold; }

        .main-container { text-align: center; width: 100%; max-width: 400px; padding: 20px; }
        .logo { font-size: 32px; font-weight: 500; letter-spacing: 8px; margin-bottom: 60px; }
        
        .btn-group { display: flex; flex-direction: column; gap: 12px; }
        .primary-btn { background: var(--accent); color: #000; border: none; padding: 14px; border-radius: 4px; font-size: 15px; font-weight: 500; cursor: pointer; width: 100%; }
        .secondary-btn { background: transparent; color: var(--text); border: 1px solid #333; padding: 14px; border-radius: 4px; font-size: 15px; cursor: pointer; width: 100%; }

        /* Dashboard Styles */
        .dashboard { display: none; flex-direction: column; gap: 15px; width: 100%; max-width: 400px; text-align: left; padding: 20px; animation: fadeIn 0.5s ease; }
        .card { background: var(--card-bg); border: 1px solid #222; padding: 20px; border-radius: 12px; position: relative; cursor: pointer; transition: 0.2s; }
        .card:active { transform: scale(0.98); background: #1a1a1a; }
        .card-title { color: var(--secondary); font-size: 11px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
        .card-value { font-size: 22px; font-weight: 500; }
        .status-badge { position: absolute; top: 20px; right: 20px; font-size: 10px; color: var(--gold); border: 1px solid var(--gold); padding: 2px 8px; border-radius: 10px; }
        
        #status-msg { margin-top: 20px; font-size: 13px; color: var(--gold); text-align: center; min-height: 20px; }
        #huid-tag { font-family: monospace; color: var(--gold); margin-top: 15px; font-size: 14px; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="lang-switch">
        <button class="lang-btn active" onclick="setLang('ru')" id="ru-btn">RU</button>
        <button class="lang-btn" onclick="setLang('en')" id="en-btn">EN</button>
    </div>

    <div class="main-container" id="app-content">
        <div id="home-view">
            <div class="logo">BSMLH</div>
            <div class="btn-group">
                <button class="primary-btn" id="login-text" onclick="secureLogin()">Войти (NFC)</button>
                <button class="secondary-btn" id="reg-text" onclick="startOnboarding()">Зарегистрироваться</button>
            </div>
            <div id="status-msg"></div>
        </div>
        <div id="dynamic-content"></div>
    </div>

    <div class="dashboard" id="main-dashboard">
        <div style="margin-bottom: 25px;">
            <div style="font-size: 14px; color: var(--secondary);" id="welcome-text">Добро пожаловать,</div>
            <div id="user-huid-display" style="font-weight: 500; letter-spacing: 1px; font-size: 18px;">HUID-2026-XXXX</div>
        </div>

        <div class="card" onclick="alert('Данные личности защищены чипом BSMLH.')">
            <div class="status-badge">Soulbound</div>
            <div class="card-title" id="card-id-label">Личность</div>
            <div class="card-value" id="card-id-val">Верифицирован 🛡️</div>
        </div>

        <div class="card" onclick="patentIdea()">
            <div class="card-title">QRT Balance</div>
            <div class="card-value">1.00 QRT</div>
            <div style="font-size: 11px; color: #44ff44; margin-top: 5px;">+1.00 Registration</div>
        </div>

        <div class="card" onclick="alert('Репутация повышается при создании патентов.')">
            <div class="card-title">QRNC Reputation</div>
            <div class="card-value">0.01 XP</div>
            <div style="height: 4px; background: #222; width: 100%; margin-top: 10px; border-radius: 2px; overflow: hidden;">
                <div style="height: 100%; background: var(--gold); width: 15%;"></div>
            </div>
        </div>

        <button class="secondary-btn" style="margin-top: 20px; border-color: #222;" onclick="location.reload()">Выйти</button>
    </div>

    <script>
        let selectedLang = 'ru';
        let currentStep = 0;

        const translations = {
            ru: {
                login: "Войти (NFC)", reg: "Зарегистрироваться", welcome: "Добро пожаловать,",
                cardId: "Личность", verified: "Верифицирован 🛡️", next: "Далее",
                kycTitle: "Верификация", kycScan: "📸 Нажмите для сканирования паспорта",
                statusGen: "⌛ Генерация HUID...", statusOk: "✅ Готово. Приложите кольцо",
                nfcWaiting: "Поднесите кольцо к датчику...",
                nfcError: "NFC не найден. Введите код доступа (1234):",
                accessDenied: "❌ ОШИБКА: Это кольцо не привязано к данному HUID!",
                regFirst: "Сначала пройдите регистрацию!",
                patentPrompt: "Опишите вашу идею для патента (запись в блокчейн):",
                patentSuccess: "Патентная заявка отправлена в сеть BSMLH!",
                steps: [
                    { title: "HUID", desc: "Ваша цифровая личность нового поколения." },
                    { title: "BSMLH CHIP", desc: "Ваше кольцо — единственный ключ к данным." },
                    { title: "Безопасность", desc: "Децентрализованное хранение данных." }
                ]
            },
            en: {
                login: "Login (NFC)", reg: "Register", welcome: "Welcome back,",
                cardId: "Identity", verified: "Verified 🛡️", next: "Next",
                kycTitle: "Verification", kycScan: "📸 Tap to scan passport",
                statusGen: "⌛ Generating HUID...", statusOk: "✅ Ready. Tap ring",
                nfcWaiting: "Hold your ring to the sensor...",
                nfcError: "NFC not found. Enter access code (1234):",
                accessDenied: "❌ ERROR: Ring not recognized!",
                regFirst: "Please register first!",
                patentPrompt: "Describe your patent idea (blockchain entry):",
                patentSuccess: "Patent request sent to BSMLH network!",
                steps: [
                    { title: "HUID", desc: "Your next-gen digital identity." },
                    { title: "BSMLH CHIP", desc: "Your ring is the only key to your data." },
                    { title: "Security", desc: "Decentralized data storage." }
                ]
            }
        };

        function setLang(lang) {
            selectedLang = lang;
            const d = translations[lang];
            document.getElementById('login-text').innerText = d.login;
            document.getElementById('reg-text').innerText = d.reg;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(lang + '-btn').classList.add('active');
        }

        async function secureLogin() {
            const d = translations[selectedLang];
            const msg = document.getElementById('status-msg');
            const savedUID = localStorage.getItem('nfc_uid');

            if (!savedUID) { msg.innerText = d.regFirst; return; }

            if ('NDEFReader' in window) {
                try {
                    const ndef = new NDEFReader();
                    await ndef.scan();
                    msg.innerText = d.nfcWaiting;
                    ndef.onreading = event => {
                        if (event.serialNumber === savedUID) {
                            showDashboard(localStorage.getItem('huid'));
                        } else {
                            msg.style.color = "var(--error)";
                            msg.innerText = d.accessDenied;
                        }
                    };
                } catch (e) { pcFallback(); }
            } else { pcFallback(); }
        }

        function pcFallback() {
            const code = prompt(translations[selectedLang].nfcError);
            if (code === "1234") {
                showDashboard(localStorage.getItem('huid') || "HUID-2026-PC-MASTER");
            } else if (code !== null) {
                alert("Неверный код!");
            }
        }

        function patentIdea() {
            const d = translations[selectedLang];
            const idea = prompt(d.patentPrompt);
            if (idea) alert(d.patentSuccess);
        }

        function startOnboarding() {
            currentStep = 0;
            document.getElementById('home-view').style.display = 'none';
            renderStep();
        }

        function renderStep() {
            const d = translations[selectedLang];
            const content = document.getElementById('dynamic-content');
            if (currentStep < d.steps.length) {
                content.innerHTML = `
                    <div style="font-size: 12px; color: var(--secondary); margin-bottom: 20px;">${currentStep+1}/3</div>
                    <h2 style="margin-bottom: 15px;">${d.steps[currentStep].title}</h2>
                    <p style="color: var(--secondary); margin-bottom: 40px; line-height: 1.5;">${d.steps[currentStep].desc}</p>
                    <button class="primary-btn" onclick="currentStep++; renderStep()">${d.next}</button>
                `;
            } else { renderKYC(); }
        }

        function renderKYC() {
            const d = translations[selectedLang];
            document.getElementById('dynamic-content').innerHTML = `
                <h2 style="margin-bottom: 30px;">${d.kycTitle}</h2>
                <div id="scan-box" style="border: 1px dashed #333; padding: 40px; border-radius: 8px; cursor: pointer;" onclick="runKYC()">
                    <span id="st-text">${d.kycScan}</span>
                </div>
                <div id="huid-tag"></div>
            `;
        }

        async function runKYC() {
            const d = translations[selectedLang];
            const st = document.getElementById('st-text');
            st.innerText = d.statusGen;

            setTimeout(async () => {
                const newHuid = "HUID-2026-" + Math.random().toString(16).slice(2,10).toUpperCase();
                document.getElementById('huid-tag').innerText = newHuid;
                st.innerText = d.statusOk;

                if ('NDEFReader' in window) {
                    try {
                        const ndef = new NDEFReader();
                        await ndef.scan();
                        ndef.onreading = event => {
                            localStorage.setItem('nfc_uid', event.serialNumber);
                            localStorage.setItem('huid', newHuid);
                            showDashboard(newHuid);
                        };
                    } catch (e) { saveEmulator(newHuid); }
                } else { saveEmulator(newHuid); }
            }, 2000);
        }

        function saveEmulator(huid) {
            localStorage.setItem('nfc_uid', 'PC-DEBUG');
            localStorage.setItem('huid', huid);
            setTimeout(() => showDashboard(huid), 1500);
        }

        function showDashboard(huid) {
            document.getElementById('app-content').style.display = 'none';
            document.getElementById('main-dashboard').style.display = 'flex';
            document.getElementById('user-huid-display').innerText = huid;
            document.getElementById('welcome-text').innerText = translations[selectedLang].welcome;
        }
    </script>
</body>
</html>
